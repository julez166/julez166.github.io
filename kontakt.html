</head>
<body>
<nav>
    <a href="index.html" style="text-decoration: none;">
        <div class="logo">julez166</div>

        <li><a href="services.html">Services</a></li>

        <li><a href="ueber-mich.html">Über mich</a></li>

    </ul>
</nav>
<header class="hero-small">
    <h2>Verbesser jetzt deinen Sound!</h2>
    <p>Lass uns an deinem nächsten Projekt arbeiten.</p>
</header>
<div class="container">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <form action="https://formspree.io/f/DEINE_ID" method="POST">
            <div style="margin-bottom: 20px;">
                <label style="display: block; color: var(--accent); margin-bottom: 5px;">Name</label>
                <input type="text" name="name" placeholder="Dein Name" required style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 8px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; color: var(--accent); margin-bottom: 5px;">E-Mail</label>
                <input type="email" name="email" placeholder="deine@mail.de" required style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 8px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; color: var(--accent); margin-bottom: 5px;">Deine Nachricht (Mix/Master/Feature?)</label>
                <textarea name="message" rows="5" placeholder="Erzähl mir von deinem Projekt..." required style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 8px;"></textarea>
            </div>
            <button type="submit" class="btn" style="width: 100%; border: none; cursor: pointer;">Nachricht senden</button>
        </form>
    </div>
</div>
