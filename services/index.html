<script>
    const cart = {};

    function toggleCart(id, label, price, btn) {
        if (cart[id]) {
            delete cart[id];
            btn.classList.remove('in-cart');
            btn.innerHTML = id === 'feature'
                ? '<i class="fa-solid fa-cart-plus"></i> Anfragen'
                : '<i class="fa-solid fa-cart-plus"></i> In den Warenkorb';
        } else {
            cart[id] = { label, price };
            btn.classList.add('in-cart');
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Ausgewählt';
        }
        updateCartBar();
    }

    function removeFromCart(id) {
        if (!cart[id]) return;
        delete cart[id];
        const btn = document.querySelector(`#card-${id} .add-to-cart-btn`);
        if (btn) {
            btn.classList.remove('in-cart');
            btn.innerHTML = id === 'feature'
                ? '<i class="fa-solid fa-cart-plus"></i> Anfragen'
                : '<i class="fa-solid fa-cart-plus"></i> In den Warenkorb';
        }
        updateCartBar();
    }

    function updateCartBar() {
        const bar = document.getElementById('cartBar');
        const list = document.getElementById('cartItemsList');
        const total = document.getElementById('cartTotal');
        const items = Object.entries(cart);

        if (items.length === 0) {
            bar.classList.remove('visible');
            return;
        }

        bar.classList.add('visible');

        list.innerHTML = items.map(([id, { label }]) =>
            `<span class="cart-chip">
                ${label}
                <span class="cart-chip-remove" onclick="removeFromCart('${id}')">
                    <i class="fa-solid fa-xmark"></i>
                </span>
            </span>`
        ).join('');

        const sum = items.reduce((acc, [, { price }]) => acc + price, 0);
        total.textContent = sum > 0 ? `ab ${sum} €` : 'Kostenlos';
    }

    function goToKontakt() {
        const items = Object.values(cart).map(i => i.label).join(', ');
        const url = `../kontakt/?service=${encodeURIComponent(items)}`;
        window.location.href = url;
    }
</script>
